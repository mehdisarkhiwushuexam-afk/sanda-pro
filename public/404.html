<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — SANDA PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
html,body{height:100%;display:flex;align-items:center;justify-content:center;
  background:var(--bg);font-family:var(--font)}
.wrap{text-align:center}
.code{font-family:var(--disp);font-size:120px;letter-spacing:-4px;
  color:var(--muted);line-height:1}
.title{font-family:var(--disp);font-size:28px;letter-spacing:4px;color:var(--txt);margin:10px 0}
.sub{font-size:12px;color:var(--muted2);letter-spacing:1px;margin-bottom:28px}
.btn{display:inline-block;background:var(--acc);color:#000;text-decoration:none;
  font-family:var(--disp);font-size:18px;letter-spacing:3px;padding:12px 32px;
  border-radius:10px;transition:background .15s}
.btn:hover{background:#d4fb3c}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <div class="title">PAGE INTROUVABLE</div>
  <div class="sub">Cette interface n'existe pas ou a été déplacée.</div>
  <a class="btn" href="/">← RETOUR AU HUB</a>
</div>
</body>
</html>
