<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="stylesheet" href="shared.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ANNONCEUR — Wushu Sanda IWUF 2024</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060810;--s1:#0b0f1a;--s2:#111828;--s3:#192033;--b1:#1d2840;
  --red:#ff2d55;--blue:#0af;--acc:#c9f135;--gold:#ffd60a;
  --txt:#f0f4ff;--muted:#4a5880;--muted2:#7a8aaa;
  --disp:'Bebas Neue',sans-serif;--font:'IBM Plex Mono',monospace;
}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:13px}
#app{display:flex;flex-direction:column;height:100vh}

header{background:var(--s1);border-bottom:1px solid var(--b1);padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.h-badge{background:var(--gold);color:#000;font-family:var(--disp);font-size:11px;
  padding:3px 10px;border-radius:4px;letter-spacing:2px}
.h-title{font-family:var(--disp);font-size:16px;letter-spacing:3px}

#main{flex:1;display:grid;grid-template-columns:1fr 340px;overflow:hidden}

/* Left: script area */
.script-area{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--b1)}
.sa-head{padding:12px 16px;border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between}
.sa-title{font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase}
.sa-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}

/* Script card */
.script-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;overflow:hidden;
  transition:border-color .2s}
.script-card.active{border-color:var(--acc)}
.sc-head{padding:10px 14px;border-bottom:1px solid var(--b1);display:flex;
  align-items:center;justify-content:space-between}
.sc-type{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.sc-when{font-size:10px;color:var(--muted);letter-spacing:.5px}
.sc-body{padding:12px 14px}
.sc-fr{font-size:13px;line-height:1.6;color:var(--txt);margin-bottom:8px;
  background:rgba(201,241,53,.04);border-left:2px solid var(--acc);padding:6px 10px;
  border-radius:0 6px 6px 0}
.sc-ar{font-size:12px;line-height:1.7;color:var(--muted2);
  border-left:2px solid rgba(255,255,255,.08);padding:6px 10px}
.sc-fill{font-size:10px;color:var(--acc);margin-top:6px;letter-spacing:.5px}
.sc-btn{margin-top:8px;background:var(--acc);color:#000;border:none;border-radius:6px;
  padding:7px 14px;font-family:var(--disp);font-size:14px;letter-spacing:1px;cursor:pointer;
  transition:all .12s}
.sc-btn:active{transform:scale(.97);background:#d4fb3c}

/* Right: live info panel */
.info-panel{display:flex;flex-direction:column;overflow:hidden}
.ip-head{padding:12px 16px;border-bottom:1px solid var(--b1)}
.ip-title{font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase}
.ip-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}

/* Match info */
.match-info-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px}
.mic-title{font-family:var(--disp);font-size:18px;letter-spacing:2px;text-align:center;margin-bottom:10px}
.mic-comp{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mic-name{font-family:var(--disp);font-size:16px;letter-spacing:1px}
.mic-score{font-family:var(--disp);font-size:40px;letter-spacing:-1px}
.mic-sep{font-size:20px;color:var(--muted)}

.mic-timer{font-family:var(--disp);font-size:42px;letter-spacing:-2px;text-align:center;
  margin-top:8px;color:var(--txt)}
.mic-timer.danger{color:var(--red)}
.mic-round{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;text-align:center}

/* Next announcement queue */
.queue-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px}
.queue-title{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.queue-item{display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.qi-num{font-family:var(--disp);font-size:20px;color:var(--muted);min-width:24px}
.qi-text{font-size:11px;color:var(--muted2);flex:1;line-height:1.4}
.qi-btn{background:none;border:1px solid var(--b1);border-radius:6px;color:var(--muted);
  padding:4px 8px;font-size:10px;cursor:pointer;font-family:var(--font)}
.qi-btn:hover{border-color:var(--acc);color:var(--acc)}

/* Done badge */
.done-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(53,245,160,.08);
  color:#35f5a0;border:1px solid rgba(53,245,160,.2);border-radius:4px;
  padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.5px}

/* custom announcement */
.custom-area{background:var(--s2);border-radius:10px;padding:12px}
.custom-inp{width:100%;background:var(--s3);border:1px solid var(--b1);border-radius:8px;
  padding:8px 10px;color:var(--txt);font-family:var(--font);font-size:12px;
  outline:none;resize:none;margin-bottom:8px}
.custom-inp:focus{border-color:var(--acc)}
.custom-btns{display:flex;gap:6px}
.cbtn{flex:1;border:none;border-radius:8px;padding:8px;font-family:var(--disp);
  font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .12s}
.cbtn:active{transform:scale(.97)}
.cbtn-say{background:var(--acc);color:#000}
.cbtn-tts{background:rgba(0,170,255,.1);border:1px solid rgba(0,170,255,.3);color:var(--blue)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="h-badge">MICRO</div>
      <div class="h-title">ANNONCEUR</div>
    </div>
    <div style="font-size:10px;color:var(--muted);letter-spacing:1px">IWUF 2024 • Art. 16.13</div>
  </header>

  <div id="main">
    <!-- SCRIPT AREA -->
    <div class="script-area">
      <div class="sa-head">
        <span class="sa-title">SCRIPTS D'ANNONCE</span>
        <span style="font-size:10px;color:var(--muted)">FR / AR</span>
      </div>
      <div class="sa-body" id="scripts-body">
        <!-- filled by JS -->
      </div>
    </div>

    <!-- INFO PANEL -->
    <div class="info-panel">
      <div class="ip-head">
        <div class="ip-title">INFORMATIONS EN DIRECT</div>
      </div>
      <div class="ip-body">
        <!-- Match current state -->
        <div class="match-info-card">
          <div class="mic-title" id="mi-cat">ADULTES — HOMMES — 70KG</div>
          <div class="mic-comp">
            <div>
              <div class="mic-name" style="color:var(--red)" id="mi-red-name">ROUGE</div>
              <div style="font-size:10px;color:var(--muted)" id="mi-red-team">&nbsp;</div>
            </div>
            <div class="mic-score" style="color:var(--red)" id="mi-red-score">0</div>
            <div class="mic-sep">–</div>
            <div class="mic-score" style="color:var(--blue)" id="mi-blue-score">0</div>
            <div style="text-align:right">
              <div class="mic-name" style="color:var(--blue)" id="mi-blue-name">BLEU</div>
              <div style="font-size:10px;color:var(--muted)" id="mi-blue-team">&nbsp;</div>
            </div>
          </div>
          <div class="mic-timer" id="mi-timer">2:00</div>
          <div class="mic-round" id="mi-round">ROUND 1 / 3</div>
        </div>

        <!-- Custom announcement -->
        <div class="custom-area">
          <div style="font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">ANNONCE LIBRE</div>
          <textarea class="custom-inp" id="custom-text" rows="3" placeholder="Entrez votre annonce..."></textarea>
          <div class="custom-btns">
            <button class="cbtn cbtn-say" onclick="markCustomDone()">✓ ANNONCÉ</button>
            <button class="cbtn cbtn-tts" onclick="speakText()">🔊 TTS</button>
          </div>
        </div>

        <!-- Round results as they come -->
        <div id="round-results-card" style="display:none">
          <div class="queue-card">
            <div class="queue-title">RÉSULTATS DES ROUNDS</div>
            <div id="round-results-body"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const fmt2 = n => String(n).padStart(2,'0');
let announced = new Set();
let matchData = null;
let timerData = null;

// ── SCRIPT TEMPLATES ──
function buildScripts(m, t){
  if(!m||!t) return [];
  const red=(m.redName||'Rouge').toUpperCase();
  const blue=(m.blueName||'Bleu').toUpperCase();
  const rteam=(m.redTeam||'').toUpperCase();
  const bteam=(m.blueTeam||'').toUpperCase();
  const cat=(m.category||'').toUpperCase();
  const round=t.round||1;
  const ri=round-1;
  const rs=m.redScores?.[ri]||0, bs=m.blueScores?.[ri]||0;
  const rr=m.redRoundsWon||0, br=m.blueRoundsWon||0;

  const scripts = [
    {
      id:'intro',
      type:'intro',
      typeColor:'var(--acc)',
      when:'Début de match',
      fr:`Mesdames et messieurs, bienvenue à ce combat de Wushu Sanda.
Dans le coin rouge — représentant ${rteam||'son équipe'} — ${red}.
Dans le coin bleu — représentant ${bteam||'son équipe'} — ${blue}.
Ce combat se disputera en trois rounds de deux minutes.
Que le meilleur compétiteur gagne !`,
      ar:`السيدات والسادة، أهلاً بكم في هذه المباراة.
في الزاوية الحمراء — ${red}.
في الزاوية الزرقاء — ${blue}.
هذه المباراة من ثلاث جولتين دقيقتين.`,
      fill:`[${red}] et [${blue}] — Catégorie: ${cat||'à compléter'}`
    },
    {
      id:`round-start-${round}`,
      type:`ROUND ${round}`,
      typeColor:'var(--blue)',
      when:`Avant le round ${round}`,
      fr:`Round ${round} — En position !
Prêts ? Combat !`,
      ar:`الجولة ${round} — في المواقع !
استعدوا — ابدأ !`,
      fill:null
    },
    {
      id:`round-result-${round-1}`,
      type:'RÉSULTAT ROUND',
      typeColor:'var(--red)',
      when:`Fin du round ${round>1?round-1:'(en attente)'}`,
      fr:round>1?`Le résultat du round ${round-1} :
Côté rouge — ${m.redScores?.[round-2]||0} points.
Côté bleu — ${m.blueScores?.[round-2]||0} points.
${(m.roundResults||[])[round-2]?.winner==='red'?`Round ${round-1} pour ${red} !`:(m.roundResults||[])[round-2]?.winner==='blue'?`Round ${round-1} pour ${blue} !`:`Round ${round-1} nul.`}`:'(Disponible après le round 1)',
      ar:round>1?`نتيجة الجولة ${round-1} :
الزاوية الحمراء — ${m.redScores?.[round-2]||0} نقاط.
الزاوية الزرقاء — ${m.blueScores?.[round-2]||0} نقاط.`:'',
      fill:null
    },
    {
      id:'winner',
      type:'VAINQUEUR',
      typeColor:'var(--gold)',
      when:'Fin du match',
      fr:m.winner?`Mesdames et messieurs — le résultat de ce combat !
Score final : côté rouge ${(m.redScores||[0,0,0]).reduce((a,b)=>a+b,0)} points, côté bleu ${(m.blueScores||[0,0,0]).reduce((a,b)=>a+b,0)} points.
Rounds remportés : ${red} — ${rr}, ${blue} — ${br}.
Le vainqueur de ce combat, par décision des juges —
${m.winner==='red'?red:blue} !`:'(Disponible à la fin du match)',
      ar:m.winner?`السيدات والسادة — نتيجة هذه المباراة !
الفائز — ${m.winner==='red'?red:blue} !`:'',
      fill:null
    },
    {
      id:'dq',
      type:'DISQUALIFICATION',
      typeColor:'var(--red)',
      when:'Si disqualification',
      fr:`Attention ! Suite à une violation du règlement IWUF 2024, article 22,
[NOM DU COMPÉTITEUR] est disqualifié(e) de ce combat.
Le vainqueur est déclaré par disqualification.`,
      ar:`تنبيه ! بسبب انتهاك قواعد الاتحاد الدولي للوشو 2024،
يُستبعد [اسم المتسابق] من هذه المباراة.`,
      fill:'[Remplacer NOM DU COMPÉTITEUR]'
    }
  ];
  return scripts;
}

function renderScripts(){
  const scripts = buildScripts(matchData, timerData);
  const sb = document.getElementById('scripts-body');
  if(!scripts.length){
    sb.innerHTML='<div style="color:var(--muted);font-size:12px;padding:10px 0">En attente des données du match...</div>';
    return;
  }
  sb.innerHTML = scripts.map(s=>`
    <div class="script-card${announced.has(s.id)?' active':''}">
      <div class="sc-head">
        <span class="sc-type" style="color:${s.typeColor}">${s.type}</span>
        <span class="sc-when">${s.when}</span>
      </div>
      <div class="sc-body">
        <div class="sc-fr">${s.fr.replace(/\n/g,'<br>')}</div>
        ${s.ar?`<div class="sc-ar">${s.ar.replace(/\n/g,'<br>')}</div>`:''}
        ${s.fill?`<div class="sc-fill">📝 ${s.fill}</div>`:''}
        <div style="display:flex;gap:6px;align-items:center;margin-top:8px">
          <button class="sc-btn" onclick="markDone('${s.id}','${s.fr.replace(/'/g,"\\'").replace(/\n/g,' ')}')">
            ${announced.has(s.id)?'✓ ANNONCÉ':'🎙 MARQUER ANNONCÉ'}
          </button>
          <button onclick="speakScript('${s.fr.replace(/'/g,"\\'").replace(/\n/g,' ')}')"
            style="background:rgba(0,170,255,.1);border:1px solid rgba(0,170,255,.3);color:var(--blue);
            border-radius:6px;padding:7px 12px;font-family:var(--disp);font-size:13px;cursor:pointer;letter-spacing:1px">
            🔊 TTS
          </button>
          ${announced.has(s.id)?'<span class="done-badge">✓ FAIT</span>':''}
        </div>
      </div>
    </div>`).join('');
}

function markDone(id, text){
  announced.add(id);
  renderScripts();
  if(navigator.vibrate) navigator.vibrate(40);
}

function markCustomDone(){
  const txt=document.getElementById('custom-text').value.trim();
  if(txt) speakScript(txt);
  document.getElementById('custom-text').value='';
}

function speakScript(text){
  if('speechSynthesis' in window){
    const u=new SpeechSynthesisUtterance(text);
    u.lang='fr-FR';u.rate=.9;u.pitch=1;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } else {
    alert('TTS non disponible sur ce navigateur');
  }
}

function speakText(){
  const t=document.getElementById('custom-text').value.trim();
  if(t) speakScript(t);
}

// ── LIVE INFO UPDATE ──
function update(){
  const m=SP.store.get('sanda_match');
  const t=SP.store.get('sanda_timer');
  matchData=m; timerData=t;

  if(t){
    const mins=Math.floor(t.timer/60), secs=fmt2(t.timer%60);
    const te=document.getElementById('mi-timer');
    te.textContent=`${mins}:${secs}`;
    te.classList.toggle('danger',t.timer<=30);
    document.getElementById('mi-round').textContent=`ROUND ${t.round||1} / 3`;
  }
  if(m){
    const ri=(t?.round||1)-1;
    document.getElementById('mi-red-name').textContent=(m.redName||'ROUGE').toUpperCase();
    document.getElementById('mi-blue-name').textContent=(m.blueName||'BLEU').toUpperCase();
    document.getElementById('mi-red-team').textContent=m.redTeam||'';
    document.getElementById('mi-blue-team').textContent=m.blueTeam||'';
    document.getElementById('mi-red-score').textContent=m.redScores?.[ri]||0;
    document.getElementById('mi-blue-score').textContent=m.blueScores?.[ri]||0;
    document.getElementById('mi-cat').textContent=(m.category||'SANDA IWUF 2024').toUpperCase();

    // Round results
    if((m.roundResults||[]).length>0){
      document.getElementById('round-results-card').style.display='block';
      document.getElementById('round-results-body').innerHTML=(m.roundResults||[]).map(r=>`
        <div class="queue-item">
          <div class="qi-num">R${r.round}</div>
          <div class="qi-text">
            <span style="color:var(--red)">${r.red}</span> — <span style="color:var(--blue)">${r.blue}</span>
            &nbsp;•&nbsp;
            <b style="color:${r.winner==='red'?'var(--red)':r.winner==='blue'?'var(--blue)':'var(--acc)'}">
              ${r.winner==='red'?(m.redName||'ROUGE').toUpperCase():r.winner==='blue'?(m.blueName||'BLEU').toUpperCase():'ÉGALITÉ'}
            </b>
          </div>
        </div>`).join('');
    }
  }

  renderScripts();
}

function SP.store.get(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}}

SP.onSync((key)=>{
  if(['sanda_match','sanda_timer'].includes(key)) update();
});
window.addEventListener('storage',e=>{
  if(['sanda_match','sanda_timer'].includes(e.key)) update();
});
setInterval(update,1500);
update();
</script>
</body>
</html>
